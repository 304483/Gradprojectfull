name: Order Repository CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  order-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"

      # Install Gradle on the runner (no gradle-wrapper.jar required)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Run Order Test
        run: gradle --no-configuration-cache clean orderTest
        env:
          JAVA_TOOL_OPTIONS: >
            -Ddb.url=jdbc:postgresql://localhost:5432/testdb
            -Ddb.user=postgres
            -Ddb.password=postgres

        # Checkout the gh-pages branch (contains previous report/history)
      - name: Checkout gh-pages
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # Generate Allure report with history
      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          gh_pages: gh-pages
          allure_history: allure-history
          allure_results: build/allure-results
          allure_report: build/allure-report

      # Publish to GitHub Pages
      - name: Deploy Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
